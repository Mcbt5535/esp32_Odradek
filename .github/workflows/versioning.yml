name: Auto Versioning

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # 获取所有提交历史以计算提交数

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Calculate version
      run: |
        python tools/version_manager.py

    - name: Get version from file
      id: version
      run: |
        VERSION=$(cat VERSION)
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Display version
      run: |
        echo "Current version: ${{ steps.version.outputs.version }}"

    - name: Commit and push VERSION file if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git checkout ${{ github.ref_name }}
        git add VERSION
        if git status --porcelain | grep -q "VERSION"; then
          git commit -m "Auto update version to ${{ steps.version.outputs.version }} [skip ci]"
          git push origin ${{ github.ref_name }}
          echo "VERSION file updated and pushed"
        else
          echo "VERSION file unchanged, no commit needed"
        fi

    - name: Create tag if needed
      if: contains(github.event.head_commit.message, '[major]') || contains(github.event.head_commit.message, '[minor]')
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git tag -a "v${{ steps.version.outputs.version }}" -m "Release version ${{ steps.version.outputs.version }}"
        git push origin --tags